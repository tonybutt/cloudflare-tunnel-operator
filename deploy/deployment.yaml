apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-tunnel-operator
  namespace: cloudflare-operator
  labels:
    app.kubernetes.io/name: cloudflare-tunnel-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflare-tunnel-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflare-tunnel-operator
    spec:
      serviceAccountName: cloudflare-tunnel-operator
      containers:
        - name: operator
          image: ghcr.io/tonybutt/cloudflare-tunnel-operator:latest
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: token
            - name: RUST_LOG
              value: "cloudflare_tunnel_operator=info"
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
